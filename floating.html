<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>悬浮窗</title>
    <style>
      #app-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: transparent;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #app-loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loading-spinner {
        width: 24px;
        height: 24px;
        border: 3px solid rgba(0,0,0,0.1);
        border-top: 3px solid #1890ff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app-loading">
      <div class="loading-spinner"></div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/floating.ts"></script>
  </body>
</html>
